name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-json:
    name: Lint JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          echo "=== Validating JSON ==="
          FAIL=0
          for f in $(find . -name '*.json' -not -path './.git/*'); do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "  + $f"
            else
              echo "  x $f"
              FAIL=$((FAIL + 1))
            fi
          done
          for f in $(find . -name '*.kiro.hook' -not -path './.git/*'); do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "  + $f"
            else
              echo "  x $f"
              FAIL=$((FAIL + 1))
            fi
          done
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL JSON files are invalid"
            exit 1
          fi
          echo "All JSON files valid."

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          echo "=== ShellCheck ==="
          FAIL=0
          for f in $(find . -name '*.sh' -not -path './.git/*'); do
            if shellcheck -x -S warning "$f"; then
              echo "  + $f"
            else
              echo "  x $f"
              FAIL=$((FAIL + 1))
            fi
          done
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL shell scripts have issues"
            exit 1
          fi
          echo "All shell scripts pass."

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check lib/ --output-format=github

  validate-catalog:
    name: Validate Catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate Orbit catalog
        run: python3 lib/orbit_catalog.py --bootstrap-dir . validate-catalog

  validate-skills:
    name: Validate Skills Frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check YAML frontmatter in all SKILL.md
        run: |
          echo "=== Validating skill frontmatter ==="
          FAIL=0
          for f in $(find skills -name 'SKILL.md'); do
            if head -1 "$f" | grep -q '^---$'; then
              if grep -q '^name:' "$f" && grep -q '^description:' "$f"; then
                echo "  + $f"
              else
                echo "  x $f (missing name or description)"
                FAIL=$((FAIL + 1))
              fi
            else
              echo "  x $f (no frontmatter)"
              FAIL=$((FAIL + 1))
            fi
          done
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL skills missing required frontmatter"
            exit 1
          fi
          echo "All skills have valid frontmatter."

  validate-steering:
    name: Validate Steering Inclusion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check inclusion mode in all steering files
        run: |
          echo "=== Validating steering inclusion ==="
          FAIL=0
          for f in $(find steering -name '*.md' -not -name '.gitkeep'); do
            if head -1 "$f" | grep -q '^---$'; then
              if grep -q '^inclusion:' "$f"; then
                echo "  + $f"
              else
                echo "  x $f (missing inclusion mode)"
                FAIL=$((FAIL + 1))
              fi
            else
              echo "  x $f (no frontmatter)"
              FAIL=$((FAIL + 1))
            fi
          done
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL steering files missing inclusion mode"
            exit 1
          fi
          echo "All steering files have valid inclusion."

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [lint-json, lint-shell, validate-catalog]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Orbit test suite
        run: bash tests/test-all.sh
